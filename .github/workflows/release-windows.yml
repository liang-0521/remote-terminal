name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing version tag to publish"
        required: true
        default: "v0.1.0"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify release target
        shell: pwsh
        env:
          DISPATCH_TAG: ${{ inputs.release_tag }}
        run: |
          $version = node -p "require('./package.json').version"
          $releaseTag = if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $env:DISPATCH_TAG
          } else {
            $env:GITHUB_REF_NAME
          }
          if ($releaseTag -ne "v$version") {
            throw "Tag $releaseTag does not match package version v$version"
          }
          "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build and verify Windows installer
        run: npm run package:win

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $setup = "release/publish/RemoteTerminal-Setup-$version-x64.exe"
          $assets = @(
            $setup,
            "$setup.blockmap",
            "release/publish/latest.yml",
            "release/publish/SHA256SUMS.txt"
          )
          gh release create $env:RELEASE_TAG @assets --verify-tag --title "Remote Terminal $env:RELEASE_TAG" --generate-notes --latest
